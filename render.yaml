# Render blueprint for the broker-network API.
# Deploy: push to a Render-connected repo, then "New > Blueprint" and select this file.
# Production uses Neon Postgres over TCP (DATABASE_URL). Do NOT set PGLITE_DIR in
# prod: PGlite is an in-process WASM Postgres that OOMs Render free 512Mi at boot.
# The db layer (src/db/client.ts) selects node-postgres when DATABASE_URL is set,
# and only falls back to PGlite (for local/tests) when it is unset.
services:
  - type: web
    name: broker-network-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    numInstances: 1
    healthCheckPath: /listings
    autoDeploy: true
    envVars:
      - key: PORT
        value: "3000"
      - key: SWEEP_INTERVAL_MS
        value: "900000"
      # Set these as secrets in the Render dashboard (sync:false => not stored in repo).
      # DATABASE_URL is the Neon Postgres connection string (required in prod).
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      # OTP-over-email (optional). When SMTP_HOST is set the login OTP is emailed;
      # otherwise it falls back to the console provider (no email sent).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # LLM listing parser / smart-match (optional; heuristic fallback when unset).
      - key: OPENAI_API_KEY
        sync: false
